<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Meeting Scheduler</h2>
    <button id="test-notification-btn" class="test-btn">🔔 Test Notification</button>
    
    <!-- Notification Popup -->
    <div id="notification-popup" class="notification-popup hidden">
        <div class="notification-content">
            <h2>⏰ Meeting Reminder</h2>
            <p id="notification-text"></p>
            <button class="dismiss-btn" onclick="dismissNotification()">Dismiss</button>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="form-section">
            <form id="meeting-form">
                <label for="title">Meeting Title:</label>
                <input type="text" id="title" name="title" placeholder="e.g., Team Standup" required><br><br>

                <label for="date">Date:</label>
                <input type="date" id="date" name="date" required><br><br>

                <label for="time">Time:</label>
                <input type="time" id="time" name="time" required><br><br>

                <label for="duration">Duration (minutes):</label>
                <input type="number" id="duration" name="duration" min="1" required><br><br>

                <button type="submit">Schedule Meeting</button>
            </form>
        </div>

        <!-- Meetings List -->
        <div class="meetings-section">
            <h2>Scheduled Meetings</h2>
            <div id="meetings-list" class="meetings-list">
                <p class="empty-message">No meetings scheduled</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
